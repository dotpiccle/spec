name: Validate specification

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.12", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install jsonschema==4.25.1
      - run: python scripts/validate.py
      - run: python scripts/test_validate_exit_code.py
      - run: python scripts/test_reverb_metrics_tolerances.py
